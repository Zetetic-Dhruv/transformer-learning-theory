<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" role="img" aria-label="Two generalization-bound curves against routing sharpness: a smooth Dudley curve low at low sharpness and a hard Sauer curve low at high sharpness, crossing at beta-star.">
  <rect x="1" y="1" width="758" height="278" rx="12" fill="#FFFFFF" stroke="#E0DED7"/>
  <line x1="92" y1="60" x2="92" y2="232" stroke="#C9C7C0" stroke-width="1"/>
  <line x1="92" y1="232" x2="690" y2="232" stroke="#C9C7C0" stroke-width="1"/>
  <path d="M112,210 C 280,200 470,118 668,96" fill="none" stroke="#27406B" stroke-width="2.4"/>
  <path d="M112,96 C 300,118 490,200 668,210" fill="none" stroke="#B26B1E" stroke-width="2.4"/>
  <line x1="388" y1="150" x2="388" y2="232" stroke="#9a9a8a" stroke-width="1" stroke-dasharray="3 3"/>
  <circle cx="388" cy="150" r="3.5" fill="#141414"/>
  <text x="388" y="142" text-anchor="middle" font-family="Charter,Georgia,serif" font-style="italic" font-size="14" fill="#3A3A3A">&#946;Star</text>
  <text x="150" y="200" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" fill="#27406B">smooth, tighter when soft</text>
  <text x="455" y="205" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" fill="#B26B1E">hard, tighter when sharp</text>
  <text x="64" y="150" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12" fill="#6E6E6E" transform="rotate(-90 64 150)">bound on the gap</text>
  <text x="390" y="258" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12.5" fill="#6E6E6E">routing sharpness &#946;, increasing to the right</text>
</svg>
