<text x="400" y="372" font-size="12.5" font-family="Helvetica" fill="#22223b" text-anchor="middle" font-weight="normal">one candidate = one finite tree: a gate picks a child by a threshold on the input,</text>
<text x="400" y="390" font-size="12.5" font-family="Helvetica" fill="#22223b" text-anchor="middle" font-weight="normal">the chosen child answers, the node’s post-map finishes.  The compute family is</text>
<text x="400" y="408" font-size="12.5" font-family="Helvetica" fill="#22223b" text-anchor="middle" font-weight="normal">constitutive: an elementary cell at every base, a finite post-map at every node.</text>
<text x="400" y="430" font-size="11.5" font-family="Helvetica" fill="#8a8fa3" text-anchor="middle" font-weight="normal">free selection is forbidden by the machine’s own theorem: with unrestricted</text>
<text x="400" y="446" font-size="11.5" font-family="Helvetica" fill="#8a8fa3" text-anchor="middle" font-weight="normal">selectors, one step reaches every function, so candidates must be trees (data).</text>
<rect x="830" y="14" width="810" height="28" rx="14" fill="#1d4ed8" opacity="0.14" />
<text x="1235.0" y="33.5" font-size="16" font-family="Helvetica" fill="#1d4ed8" text-anchor="middle" font-weight="bold">THE TOWER  ·  strict at every rung, priced at every rung</text>
<text x="1235" y="66" font-size="12.5" font-family="Helvetica" fill="#22223b" text-anchor="middle" font-weight="normal">capacity ≤ 2^(depth+1), proved at every rung</text>
<rect x="925.0" y="80" width="620" height="272" rx="12" fill="#dae4fb" stroke="#1d4ed8" stroke-width="1.4" />
<text x="967.0" y="100" font-size="12" font-family="Helvetica" fill="#1d4ed8" text-anchor="middle" font-weight="bold">depth 3</text>
<rect x="995.0" y="134" width="480" height="218" rx="12" fill="#e4ecfd" stroke="#1d4ed8" stroke-width="1.4" />
<text x="1037.0" y="154" font-size="12" font-family="Helvetica" fill="#1d4ed8" text-anchor="middle" font-weight="bold">depth 2</text>
<rect x="1065.0" y="202" width="340" height="150" rx="12" fill="#eef3fe" stroke="#1d4ed8" stroke-width="1.4" />
<text x="1107.0" y="222" font-size="12" font-family="Helvetica" fill="#1d4ed8" text-anchor="middle" font-weight="bold">depth 1</text>
<rect x="1135.0" y="270" width="200" height="82" rx="12" fill="#f7f9ff" stroke="#1d4ed8" stroke-width="1.4" />
<text x="1177.0" y="290" font-size="12" font-family="Helvetica" fill="#1d4ed8" text-anchor="middle" font-weight="bold">depth 0</text>
<text x="1370.0" y="260" font-size="15" font-family="Helvetica" fill="#b91c1c" text-anchor="middle" font-weight="normal">★</text>
<text x="1416.0" y="259" font-size="10.5" font-family="Helvetica" fill="#b91c1c" text-anchor="middle" font-weight="normal">escapes</text>
<text x="1440.0" y="192" font-size="15" font-family="Helvetica" fill="#b91c1c" text-anchor="middle" font-weight="normal">★</text>
<text x="1486.0" y="191" font-size="10.5" font-family="Helvetica" fill="#b91c1c" text-anchor="middle" font-weight="normal">escapes</text>
<text x="1510.0" y="124" font-size="15" font-family="Helvetica" fill="#b91c1c" text-anchor="middle" font-weight="normal">★</text>
<text x="1556.0" y="123" font-size="10.5" font-family="Helvetica" fill="#b91c1c" text-anchor="middle" font-weight="normal">escapes</text>
<text x="1235" y="398" font-size="12.5" font-family="Helvetica" fill="#22223b" text-anchor="middle" font-weight="normal">every rung strictly larger, on the counting world and on the real-vector world;</text>
<text x="1235" y="416" font-size="12.5" font-family="Helvetica" fill="#22223b" text-anchor="middle" font-weight="normal">the union over all depths never exhausts the function space.  Retrieval over</text>
<text x="1235" y="434" font-size="12.5" font-family="Helvetica" fill="#22223b" text-anchor="middle" font-weight="normal">depth-sorted candidates returns a least-depth fit: built-in simplicity bias.</text>
<text x="1235" y="458" font-size="11.5" font-family="Helvetica" fill="#8a8fa3" text-anchor="middle" font-weight="normal">the machine of page one runs verbatim over this forest: same retrieval, same laws.</text>
<rect x="18" y="470" width="780" height="28" rx="14" fill="#b45309" opacity="0.14" />
<text x="408.0" y="489.5" font-size="16" font-family="Helvetica" fill="#b45309" text-anchor="middle" font-weight="bold">MODIFY BY GRAFTING  ·  the first rung climbs, in one picture</text>
<text x="130" y="528" font-size="12.5" font-family="Helvetica" fill="#b45309" text-anchor="middle" font-weight="bold">modifier: one hole</text>
