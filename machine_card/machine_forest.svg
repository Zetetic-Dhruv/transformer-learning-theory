<text x="400" y="726" font-size="12.3" font-family="Helvetica" fill="#22223b" text-anchor="middle" font-weight="normal">grafting is part of the grammar: a plugged modifier IS a tree, so modified programs</text>
<text x="400" y="744" font-size="12.3" font-family="Helvetica" fill="#22223b" text-anchor="middle" font-weight="normal">inherit every law.  Here the gate always routes to the graft and the post-map flips it:</text>
<text x="400" y="762" font-size="12.3" font-family="Helvetica" fill="#22223b" text-anchor="middle" font-weight="normal">the grafted program disagrees with its anchor on every input.  One modifier, one rung.</text>
<text x="400" y="786" font-size="11.5" font-family="Helvetica" fill="#8a8fa3" text-anchor="middle" font-weight="normal">retrieval over modifiers = grafting: the accepted anchor enters every candidate by the hole.</text>
<rect x="830" y="470" width="810" height="28" rx="14" fill="#6d28d9" opacity="0.14" />
<text x="1235.0" y="489.5" font-size="16" font-family="Helvetica" fill="#6d28d9" text-anchor="middle" font-weight="bold">FREE IS FLAT, BOUND CLIMBS  ·  the dichotomy</text>
<path d="M900,760 L1380,760" stroke="#22223b" stroke-width="1.8" fill="none" marker-end="url(#ah0)" />
<path d="M900,760 L900,550" stroke="#22223b" stroke-width="1.8" fill="none" marker-end="url(#ah0)" />
<text x="1140.0" y="786" font-size="12" font-family="Helvetica" fill="#8a8fa3" text-anchor="middle" font-weight="normal">modifier depth</text>
<text x="886" y="540" font-size="12" font-family="Helvetica" fill="#8a8fa3" text-anchor="start" font-weight="normal">reachable programs</text>
<path d="M900,708 L1360,708" stroke="#b91c1c" stroke-width="2.6" fill="none" stroke-dasharray="7,5" />
<text x="1136" y="698" font-size="11.5" font-family="Helvetica" fill="#b91c1c" text-anchor="middle" font-weight="normal">free modifiers: flat at the object class (any depth collapses to one step)</text>
<path d="M900,740 L1010,740" stroke="#15803d" stroke-width="2.6" fill="none" />
<path d="M1010,740 L1010,702" stroke="#15803d" stroke-width="2.6" fill="none" />
