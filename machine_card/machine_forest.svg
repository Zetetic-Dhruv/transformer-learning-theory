<text x="1150" y="570" font-size="12" font-family="Helvetica" fill="#15803d" text-anchor="middle" font-weight="bold">grammar-bound modifiers climb the tower</text>
<text x="1235" y="806" font-size="11.8" font-family="Helvetica" fill="#22223b" text-anchor="middle" font-weight="normal">embedding within two rungs; strict climb proved at stride three;</text>
<text x="1235" y="824" font-size="11.8" font-family="Helvetica" fill="#22223b" text-anchor="middle" font-weight="normal">in the limit the graft loses nothing: the bound ladder fills the whole tower.</text>
<text x="1235" y="846" font-size="11.3" font-family="Helvetica" fill="#8a8fa3" text-anchor="middle" font-weight="normal">certificates chain at every storey (page two); the per-storey capacity product prices execution.</text>
