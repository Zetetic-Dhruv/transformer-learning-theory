<text x="413" y="218" font-size="12.3" font-family="Helvetica" fill="#22223b" text-anchor="middle" font-weight="normal">two DIFFERENT objects, identical under every read in the family: indistinguishable.</text>
<text x="413" y="236" font-size="12.3" font-family="Helvetica" fill="#22223b" text-anchor="middle" font-weight="normal">enlarging the family is what separates them; repeating the existing reads does nothing.</text>
<text x="413" y="260" font-size="11.5" font-family="Helvetica" fill="#8a8fa3" text-anchor="middle" font-weight="normal">on the causal store of page three, the family is observation and the enlarging read is an intervention.</text>
